<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8637a;
    --rose-soft: #f4b8c1;
    --deep: #1a0a14;
    --abyss: #0d0509;
    --gold: #d4a853;
    --gold-soft: #e8cc8a;
    --cream: #fdf5f7;
    --wine: #6b1f35;
    --wine-deep: #3a0f1d;
    --blush: rgba(232,99,122,0.12);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Raleway', sans-serif;
    background: var(--abyss); color: var(--cream);
    cursor: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ── CUSTOM CURSOR ── */
  #cur {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: var(--rose); pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 16px 4px rgba(232,99,122,0.45);
    transition: width 0.2s, height 0.2s;
  }
  #cur-trail {
    position: fixed; width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(232,99,122,0.2); pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
  }

  /* ── PARTICLE CANVAS ── */
  #canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  /* ── BACKGROUND ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 85%, rgba(107,31,53,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 85% 15%, rgba(232,99,122,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(212,168,83,0.06) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 50% 50%, var(--deep) 0%, var(--abyss) 100%);
  }
  .aurora {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
    animation: drift 20s ease-in-out infinite alternate;
  }
  .aurora.a1 { width: 600px; height: 350px; top: -8%; left: -10%;
    background: radial-gradient(ellipse, rgba(107,31,53,0.35), transparent 70%);
    animation-duration: 24s; }
  .aurora.a2 { width: 400px; height: 500px; top: 35%; right: -8%;
    background: radial-gradient(ellipse, rgba(232,99,122,0.15), transparent 70%);
    animation-duration: 18s; animation-delay: -6s; }
  .aurora.a3 { width: 500px; height: 300px; bottom: -5%; left: 25%;
    background: radial-gradient(ellipse, rgba(212,168,83,0.08), transparent 70%);
    animation-duration: 22s; animation-delay: -12s; }
  @keyframes drift {
    0% { transform: translate(0,0) scale(1) }
    33% { transform: translate(30px,-20px) scale(1.05) }
    66% { transform: translate(-20px,15px) scale(0.97) }
    100% { transform: translate(15px,-8px) scale(1.02) }
  }

  /* ── STAR FIELD ── */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
    z-index: 10; transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .screen.out { opacity: 0; transform: scale(1.03); pointer-events: none; }
  .screen.gone { display: none; }

  /* ── GLASS CARD ── */
  .glass {
    position: relative; text-align: center; border-radius: 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(232,99,122,0.15);
    backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
    box-shadow:
      0 0 80px rgba(232,99,122,0.08),
      0 32px 64px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.04);
    max-width: 480px; width: 92%; padding: 52px 44px;
    animation: rise 1.2s cubic-bezier(.22,.68,0,1.1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(28px) scale(0.96) }
    to { opacity: 1; transform: translateY(0) scale(1) }
  }
  .glass .icon { font-size: 2.4rem; margin-bottom: 20px; display: block; }
  .glass h2 {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
    font-size: clamp(1.4rem, 4vw, 1.9rem); color: var(--cream);
    line-height: 1.45; margin-bottom: 10px;
  }
  .glass .sub {
    font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(244,184,193,0.4); margin-bottom: 36px;
  }

  /* ── STEP DOTS ── */
  .step-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(232,99,122,0.2);
    transition: all 0.5s cubic-bezier(.22,.68,0,1);
  }
  .dot.active {
    background: var(--rose);
    box-shadow: 0 0 10px rgba(232,99,122,0.5);
    transform: scale(1.3);
  }
  .dot.done {
    background: var(--gold);
    box-shadow: 0 0 6px rgba(212,168,83,0.3);
  }

  /* ── CHOICE GRID ── */
  .choice-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px;
  }
  .choice-btn {
    padding: 16px 14px; border-radius: 16px;
    border: 1px solid rgba(232,99,122,0.18);
    background: rgba(255,255,255,0.03);
    color: rgba(253,245,247,0.8);
    font-family: 'Cormorant Garamond', serif; font-size: 0.95rem;
    cursor: none; transition: all 0.3s cubic-bezier(.22,.68,0,1);
    line-height: 1.4; text-align: center;
  }
  .choice-btn:not(.wrong):not(.right):hover {
    background: rgba(232,99,122,0.1);
    border-color: rgba(232,99,122,0.5);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(232,99,122,0.18);
  }
  .choice-btn.wrong {
    animation: shake 0.45s ease both;
    background: rgba(80,10,20,0.25);
    border-color: rgba(180,50,50,0.2);
    color: rgba(244,184,193,0.25);
    pointer-events: none;
  }
  .choice-btn.right {
    background: linear-gradient(135deg, rgba(232,99,122,0.2), rgba(212,168,83,0.15));
    border-color: var(--gold);
    color: var(--cream);
    box-shadow: 0 0 32px rgba(212,168,83,0.2);
    pointer-events: none;
    animation: rightPulse 0.8s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0) }
    20% { transform: translateX(-8px) }
    40% { transform: translateX(8px) }
    60% { transform: translateX(-5px) }
    80% { transform: translateX(5px) }
  }
  @keyframes rightPulse {
    0% { box-shadow: 0 0 0 0 rgba(212,168,83,0.45) }
    70% { box-shadow: 0 0 0 16px rgba(212,168,83,0) }
    100% { box-shadow: 0 0 0 0 rgba(212,168,83,0) }
  }

  /* ── REACTION ── */
  .reaction {
    margin-top: 20px; font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1rem; color: rgba(244,184,193,0.65); min-height: 24px;
    transition: opacity 0.5s, transform 0.5s; opacity: 0; transform: translateY(6px);
  }
  .reaction.show { opacity: 1; transform: translateY(0); }

  /* ── PASSWORD SCREEN ── */
  .input-wrap { margin-bottom: 18px; }
  .input-wrap input {
    width: 100%; padding: 15px 22px; border-radius: 50px;
    border: 1px solid rgba(232,99,122,0.25);
    background: rgba(255,255,255,0.04);
    color: var(--cream); font-family: 'Raleway', sans-serif; font-size: 0.92rem;
    letter-spacing: 0.12em; text-align: center; outline: none;
    cursor: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrap input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(232,99,122,0.12), 0 0 30px rgba(232,99,122,0.08);
  }
  .input-wrap input::placeholder { color: rgba(244,184,193,0.25); letter-spacing: 0.15em; }
  .btn-open {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 40px; border: none; border-radius: 50px;
    background: linear-gradient(135deg, #e8637a, #c0445d); color: white;
    font-family: 'Raleway', sans-serif; font-size: 0.8rem; letter-spacing: 0.22em;
    text-transform: uppercase; cursor: none; margin-top: 8px;
    transition: transform 0.3s cubic-bezier(.22,.68,0,1), box-shadow 0.3s;
    box-shadow: 0 6px 28px rgba(232,99,122,0.35);
  }
  .btn-open:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 12px 40px rgba(232,99,122,0.5);
  }
  .err {
    margin-top: 14px; font-size: 0.74rem; letter-spacing: 0.1em;
    color: rgba(244,184,193,0.5); height: 20px;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
  }
  .lock-hint {
    margin-top: 22px; font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 0.92rem; color: rgba(232,99,122,0.45); line-height: 1.6;
  }

  /* ── MAIN CONTENT ── */
  #screenMain {
    position: fixed; inset: 0; overflow-y: auto; z-index: 5;
    opacity: 0; transform: translateY(16px);
    transition: opacity 1.6s ease, transform 1.6s ease;
    display: none;
  }
  #screenMain.visible { opacity: 1; transform: translateY(0); }
  #screenMain::-webkit-scrollbar { width: 3px; }
  #screenMain::-webkit-scrollbar-track { background: transparent; }
  #screenMain::-webkit-scrollbar-thumb { background: rgba(232,99,122,0.3); border-radius: 10px; }

  .content-inner {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px 24px 100px;
  }

  .line-deco {
    width: 1px; height: 70px;
    background: linear-gradient(to bottom, transparent, var(--rose), transparent);
    margin-bottom: 36px; opacity: 0; animation: appear 1.2s 0.5s ease forwards;
  }
  @keyframes appear { to { opacity: 1 } }

  .tag {
    font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--rose); margin-bottom: 22px;
    opacity: 0; animation: fadeUp 1s 0.8s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px) }
    to { opacity: 1; transform: translateY(0) }
  }

  .heading {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
    font-size: clamp(2.2rem, 6.5vw, 3.8rem); color: var(--cream); text-align: center;
    line-height: 1.2; margin-bottom: 48px;
    opacity: 0; animation: fadeUp 1.2s 1s ease forwards;
  }
  .heading span { color: var(--rose); }

  /* ── CARD SCENE ── */
  .card-scene {
    position: relative; max-width: 680px; width: 100%;
    opacity: 0; animation: fadeUp 1.2s 1.4s ease forwards;
  }

  .float-photo {
    position: absolute; width: 100px; height: 100px; border-radius: 50%;
    object-fit: cover; border: 2.5px solid rgba(232,99,122,0.4);
    box-shadow: 0 0 32px rgba(232,99,122,0.25), 0 8px 32px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; z-index: 2;
    transition: opacity 2.5s ease, transform 8s ease-in-out;
  }

  #photo3 {
    position: absolute;
    top: -52px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    animation: driftHorizontal 10s ease-in-out infinite alternate;
    opacity: 0;
    transition: opacity 2.5s ease;
  }
  @keyframes driftHorizontal {
    0%   { transform: translateX(-80px); }
    100% { transform: translateX(80px); }
  }

  #photo4 {
    position: absolute;
    bottom: -52px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    animation: driftHorizontal 10s ease-in-out infinite alternate-reverse;
    opacity: 0;
    transition: opacity 2.5s ease;
  }

  .msg-card {
    position: relative; background: rgba(255,255,255,0.025);
    border: 1px solid rgba(232,99,122,0.12); border-radius: 22px;
    padding: 52px 48px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 28px 80px rgba(0,0,0,0.4),
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 0 60px rgba(232,99,122,0.04);
    z-index: 1;
  }
  .msg-card::before {
    content: '\201C'; position: absolute; top: -14px; left: 38px;
    font-family: 'Cormorant Garamond', serif; font-size: 7rem;
    color: var(--rose); opacity: 0.15; line-height: 1;
  }

  #typedText {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(1rem, 2vw, 1.2rem); line-height: 2.1;
    color: rgba(253,245,247,0.88); white-space: pre-wrap;
    max-height: 55vh; overflow-y: auto; padding-right: 8px;
  }
  #typedText::-webkit-scrollbar { width: 2px; }
  #typedText::-webkit-scrollbar-track { background: transparent; }
  #typedText::-webkit-scrollbar-thumb { background: rgba(232,99,122,0.3); border-radius: 10px; }

  .cursor-blink {
    display: inline-block; width: 2px; height: 1.1em; background: var(--rose);
    margin-left: 3px; vertical-align: text-bottom; animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }

  /* ── SEPARATOR ── */
  .sep {
    width: 140px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 40px auto 0; opacity: 0; animation: appear 1.2s 2.5s ease forwards;
  }
  .roses-row {
    display: flex; gap: 20px; margin-top: 36px; font-size: 1.3rem;
    opacity: 0; animation: appear 1.5s 3s ease forwards;
  }

  /* ── RESPONSE SECTION ── */
  .response-section {
    margin-top: 52px; max-width: 680px; width: 100%;
    opacity: 0; animation: appear 1.2s 3.6s ease forwards;
    text-align: center;
  }
  .response-section p.prompt {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.05rem; color: rgba(244,184,193,0.5);
    letter-spacing: 0.04em; margin-bottom: 22px;
  }
  .reply-btns {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px;
  }
  .reply-btn {
    padding: 13px 26px; border-radius: 50px;
    border: 1px solid rgba(232,99,122,0.25);
    background: rgba(255,255,255,0.03);
    color: rgba(253,245,247,0.75);
    font-family: 'Raleway', sans-serif; font-size: 0.74rem; letter-spacing: 0.14em;
    text-transform: uppercase; cursor: none;
    transition: all 0.3s cubic-bezier(.22,.68,0,1);
  }
  .reply-btn:hover {
    background: rgba(232,99,122,0.12); border-color: rgba(232,99,122,0.5);
    transform: translateY(-2px); box-shadow: 0 6px 24px rgba(232,99,122,0.18);
  }
  .reply-btn.selected {
    background: linear-gradient(135deg, #e8637a, #c0445d);
    border-color: transparent; color: white;
    box-shadow: 0 6px 28px rgba(232,99,122,0.4);
  }
  .reply-response {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.1rem; color: rgba(212,168,83,0.85);
    min-height: 32px; opacity: 0; transition: opacity 0.8s ease;
    line-height: 1.7;
  }
  .reply-response.show { opacity: 1; }

  .sign-off {
    margin-top: 40px; font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.05rem; color: rgba(212,168,83,0.6); text-align: center;
    line-height: 1.8;
    opacity: 0; animation: appear 1.2s 5s ease forwards;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .msg-card { padding: 32px 20px; }
    .glass { padding: 36px 22px; max-width: 96%; }
    #cur, #cur-trail { display: none; }
    html, body { cursor: auto; }
    .choice-btn, .btn-open, .reply-btn, input { cursor: auto; }

    .choice-grid {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .choice-btn {
      font-size: 0.9rem;
      padding: 14px 16px;
      text-align: left;
    }

    .float-photo {
      width: 64px !important;
      height: 64px !important;
    }

    #photo1 { left: -20px !important; }
    #photo2 { right: -20px !important; }

    #photo3 {
      top: -38px !important;
      width: 72px !important;
      height: 72px !important;
    }

    #photo4 {
      bottom: -38px !important;
      width: 72px !important;
      height: 72px !important;
    }

    @keyframes driftHorizontal {
      0%   { transform: translateX(-40px); }
      100% { transform: translateX(40px); }
    }

    .heading {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
    }

    #typedText {
      font-size: 1rem;
      line-height: 1.9;
      max-height: 60vh;
    }

    .reply-btns {
      flex-direction: column;
      align-items: center;
    }

    .reply-btn {
      width: 100%;
      max-width: 320px;
      text-align: center;
      padding: 13px 20px;
    }

    .content-inner {
      padding: 50px 16px 80px;
    }

    .answers-cards {
      flex-direction: column;
      align-items: center;
    }

    .answer-pill {
      width: 100%;
      max-width: 320px;
    }
  }
</style>
</head>
<body>

<audio id="bgAudio" loop preload="auto">
  <source src="track.mp3" type="audio/mpeg">
</audio>

<div id="cur"></div>
<div id="cur-trail"></div>

<div class="bg">
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <div class="aurora a3"></div>
</div>
<svg id="stars" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="canvas"></canvas>

<!-- ═══ SCREEN 1 — THE QUIZ ═══ -->
<div class="screen" id="screenGame">
  <div class="glass" id="gameCard">
    <div class="step-dots" id="stepDots"></div>
    <span class="icon" id="gameIcon">✨</span>
    <h2 id="gameQ"></h2>
    <p class="sub" id="gameSub"></p>
    <div class="choice-grid" id="choiceGrid"></div>
    <p class="reaction" id="reaction"></p>
  </div>
</div>

<!-- ═══ SCREEN 2 — PASSWORD ═══ -->
<div class="screen gone" id="screenLock">
  <div class="glass">
    <span class="icon">💌</span>
    <h2>Something beautiful is waiting for you</h2>
    <p class="sub">made with love · only for your eyes</p>
    <div class="input-wrap">
      <input type="password" id="codeInput" placeholder="type the word…" autocomplete="off">
    </div>
    <button class="btn-open" onclick="checkCode()">
      <span>Reveal</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7h12M8 2l5 5-5 5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <p class="err" id="err"></p>
    <p class="lock-hint">Only you know the answer ❤️</p>
  </div>
</div>

<!-- ═══ SCREEN 3 — THE MESSAGE ═══ -->
<div id="screenMain">
  <div class="content-inner">
    <div class="line-deco"></div>
    <p class="tag">Only for Tebello</p>
    <h1 class="heading">Hey, <span>beautiful</span> ❤️</h1>

    <div class="card-scene" id="cardScene">
      <img class="float-photo" id="photo1" src="photo1.jpeg" alt="">
      <img class="float-photo" id="photo2" src="photo2.jpeg" alt="">
      <img class="float-photo" id="photo3" src="photo3.jpeg" alt="">
      <img class="float-photo" id="photo4" src="photo4.jpeg" alt="">
      <div class="msg-card">
        <p id="typedText"><span class="cursor-blink"></span></p>
      </div>
    </div>

    <div class="sep"></div>
    <div class="roses-row">
      <span>🌹</span><span>🥀</span><span>🌹</span><span>🥀</span><span>🌹</span>
    </div>

    <!-- RESPONSE SECTION -->
    <div class="response-section">
      <p class="prompt">— how did this make you feel?</p>
      <div class="reply-btns">
        <button class="reply-btn" onclick="selectReply(this,'loved')">I feel loved 🌸</button>
        <button class="reply-btn" onclick="selectReply(this,'smile')">This made me smile 🥹</button>
        <button class="reply-btn" onclick="selectReply(this,'miss')">I love you more 🌹</button>
        <button class="reply-btn" onclick="selectReply(this,'cry')">I'm literally crying 😭</button>
      </div>
      <p class="reply-response" id="replyResponse"></p>
    </div>

    <p class="sign-off">— forever yours ♾️<br><span style="color:var(--rose);font-size:1.15rem;">Senzo</span></p>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG — EDIT THESE
// ══════════════════════════════════════════
const SECRET_CODE = "tebello";

const MESSAGE = `To the woman who quietly became my home,

Sometimes I look at you,
and wonder
how someone so beautiful
could feel so familiar.

You walked into my life
without asking for permission,
and somehow,
you stayed in every corner of my heart.

Your laughter
has become my favorite melody.
Your smile,
my favorite sunrise.
And your love...
the place where I find peace.

If I could give you anything,
it would be the chance
to see yourself
through my eyes—
just for a moment—
so you'd know
how deeply you are loved.

Thank you
for choosing me,
for believing in me,
for making ordinary days
feel like something worth remembering.

let audioStarted = false;

function startAudio() {
  if (audioStarted) return;
  const audio = document.getElementById('bgAudio');
  audio.volume = 0;
  audio.play().then(() => {
    audioStarted = true;
    // Fade in gently over 4 seconds
    let vol = 0;
    const fadeIn = setInterval(() => {
      vol += 0.01;
      if (vol >= 0.18) {
        audio.volume = 0.18;
        clearInterval(fadeIn);
      } else {
        audio.volume = vol;
      }
    }, 200);
  }).catch(() => {
    // Autoplay blocked — will retry on next interaction
  });
}

// STATE
// ══════════════════════════════════════════
let questionIdx = 0;
const TOTAL_STEPS = QUESTIONS.length;

// Build step dots
(function buildDots() {
  const wrap = document.getElementById('stepDots');
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot' + i;
    wrap.appendChild(d);
  }
})();

function updateDots(step) {
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'dot';
    if (i < step) d.classList.add('done');
    if (i === step) d.classList.add('active');
  }
}

// RENDER QUESTION
// ══════════════════════════════════════════
function renderQuestion() {
  const card = document.getElementById('gameCard');
  card.style.opacity = '0';
  card.style.transform = 'translateY(12px)';

  setTimeout(() => {
    const data = QUESTIONS[questionIdx];
    document.getElementById('gameIcon').textContent = data.icon;
    document.getElementById('gameQ').textContent = data.q;
    document.getElementById('gameSub').textContent = data.sub;

    const reaction = document.getElementById('reaction');
    reaction.textContent = '';
    reaction.classList.remove('show');

    const grid = document.getElementById('choiceGrid');
    grid.innerHTML = '';
    data.choices.forEach((text, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = text;
      btn.onclick = () => onSelect(btn, i, data, grid);
      grid.appendChild(btn);
    });

    updateDots(questionIdx);

    card.style.transition = 'opacity 0.55s ease, transform 0.55s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  }, 350);
}

// SELECTION HANDLER
// ══════════════════════════════════════════
function onSelect(btn, index, data, grid) {
  startAudio();
  const reaction = document.getElementById('reaction');

  if (index !== data.correctIndex) {
    btn.classList.add('wrong');
    reaction.textContent = data.wrongReaction;
    reaction.classList.add('show');
    return;
  }

  // Correct
  btn.classList.add('right');
  grid.querySelectorAll('.choice-btn:not(.right)').forEach(b => {
    b.classList.add('wrong');
    b.style.animation = 'none';
    b.style.opacity = '0.15';
  });

  reaction.textContent = data.rightReaction;
  reaction.classList.add('show');

  setTimeout(() => {
    questionIdx++;
    if (questionIdx < QUESTIONS.length) {
      renderQuestion();
    } else {
      goToPassword();
    }
  }, 1500);
}

function goToPassword() {

  setTimeout(() => {
    game.classList.add('gone');
    const lock = document.getElementById('screenLock');
    lock.classList.remove('gone');

    lock.style.transform = 'scale(0.97)';

      lock.style.transition = 'opacity 1s ease, transform 1s ease';
      lock.style.opacity = '1';
      lock.style.transform = 'scale(1)';
    }));
  }, 900);
}

function checkCode() {
  startAudio();

  const err = document.getElementById('err');

  if (val === SECRET_CODE) {
    document.getElementById('screenLock').classList.add('out');
    setTimeout(() => {
      document.getElementById('screenLock').classList.add('gone');
      const main = document.getElementById('screenMain');
      main.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        main.classList.add('visible');
        setTimeout(startTyping, 1800);
        setTimeout(startPhotos, 3500);
      }));
    }, 900);
  } else {
    err.textContent = 'Hmm… that\'s not it. Try again, love 💭';
    const box = document.querySelector('#screenLock .glass');
    ['-7px','6px','-4px','0px'].forEach((x, i) =>
      setTimeout(() => box.style.transform = `translateX(${x})`, i * 75)
    );
  }
}

// TYPEWRITER
// ══════════════════════════════════════════
let charIdx = 0;
function startTyping() {
  const el = document.getElementById('typedText');
  el.innerHTML = '<span class="cursor-blink"></span>';

  function type() {
    if (charIdx < MESSAGE.length) {
      const cur = el.querySelector('.cursor-blink');
      if (cur) cur.remove();

      if (MESSAGE[charIdx] === '\n') {
        el.innerHTML += '<br>';
      } else {
        el.innerHTML += MESSAGE[charIdx];
      }
      el.innerHTML += '<span class="cursor-blink"></span>';
      el.scrollTop = el.scrollHeight;
      charIdx++;

      // Pacing: slower at start, pauses at punctuation
      let delay = 55;
      const ch = MESSAGE[charIdx - 1];
      if (charIdx < 12) delay = 90;
      else if (ch === '.' || ch === '…' || ch === '—') delay = 280;
      else if (ch === ',') delay = 160;
      else if (ch === '\n') delay = 200;

      setTimeout(type, delay);
    }
  }
  type();
}

// FLOATING PHOTOS
// ══════════════════════════════════════════
function startPhotos() {
  const scene = document.getElementById('cardScene');
  const card = scene.querySelector('.msg-card');
  const photos = [document.getElementById('photo1'), document.getElementById('photo2')];
  let current = 0;

  function show() {
    const el = photos[current % photos.length];
    const side = Math.random() < 0.5 ? 'left' : 'right';
    const cardH = card.offsetHeight;
    const cardTop = card.offsetTop;
    const SIZE = el.offsetWidth || 100;
    const top = (cardTop + SIZE * 0.15) + Math.random() * Math.max(60, cardH - SIZE * 1.3);
    const offset = SIZE * 0.4;

    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transform = 'translateY(0) scale(0.9)';
    el.style.top = top + 'px';

    if (side === 'left') { el.style.left = `-${offset}px`; el.style.right = 'auto'; }
    else { el.style.right = `-${offset}px`; el.style.left = 'auto'; }

    const drift = (Math.random() < 0.5 ? 1 : -1) * (12 + Math.random() * 18);

    setTimeout(() => {
      el.style.transition = `opacity 2.5s ease, transform ${7 + Math.random() * 3}s ease-in-out`;
      el.style.transform = `translateY(${drift}px) scale(1)`;
      el.style.opacity = '0.75';
    }, 80);

    const stay = 5500 + Math.random() * 4000;
    setTimeout(() => {
      el.style.transition = 'opacity 2.5s ease';
      el.style.opacity = '0';
      setTimeout(() => {
        el.style.transform = 'translateY(0) scale(0.9)';
        current++;
        show();
      }, 1800 + Math.random() * 1200);
    }, stay);
  }

  show();

  const photo3 = document.getElementById('photo3');
  setTimeout(() => {
    photo3.style.opacity = '0.72';
  }, 2000);

  const photo4 = document.getElementById('photo4');
  setTimeout(() => {
    photo4.style.opacity = '0.72';
  }, 2000);
}

// ══════════════════════════════════════════
// PARTICLES (HEARTS & PETALS)
// ══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);
function rand(a, b) { return a + Math.random() * (b - a); }

function mkParticle() {
  const isHeart = Math.random() < 0.15;
  return {
    x: rand(0, W), y: rand(H + 10, H + 80),
    size: rand(4, isHeart ? 14 : 7),
    speedY: rand(0.3, 1.1), speedX: rand(-0.2, 0.2),
    opacity: rand(0.05, 0.32),
    type: isHeart ? 'heart' : 'petal',
    rotation: rand(0, Math.PI * 2),
    rotSpeed: rand(-0.01, 0.01),
    wobble: rand(0, Math.PI * 2),
    wobbleSpeed: rand(0.008, 0.02),
  };
}

function drawHeart(x, y, s, o, r) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(r); ctx.globalAlpha = o;
  ctx.fillStyle = '#e8637a';
  const h = s * 0.5;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.4);
  ctx.bezierCurveTo(0, -h * 0.2, -h, -h * 0.2, -h, h * 0.4);
  ctx.bezierCurveTo(-h, h, 0, h * 1.6, 0, h * 1.6);
  ctx.bezierCurveTo(0, h * 1.6, h, h, h, h * 0.4);
  ctx.bezierCurveTo(h, -h * 0.2, 0, -h * 0.2, 0, h * 0.4);
  ctx.fill(); ctx.restore();
}

function drawPetal(x, y, s, o, r) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(r); ctx.globalAlpha = o;
  ctx.fillStyle = `hsl(${rand(340, 358)}, 68%, 70%)`;
  ctx.beginPath(); ctx.ellipse(0, 0, s * 0.35, s, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.restore();
}

// Seed initial particles
for (let k = 0; k < 30; k++) { const p = mkParticle(); p.y = rand(0, H); particles.push(p); }

(function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.y -= p.speedY;
    p.wobble += p.wobbleSpeed;
    p.x += p.speedX + Math.sin(p.wobble) * 0.25;
    p.rotation += p.rotSpeed;
    if (p.type === 'heart') drawHeart(p.x, p.y, p.size, p.opacity, p.rotation);
    else drawPetal(p.x, p.y, p.size, p.opacity, p.rotation);
    if (p.y < -30) particles[i] = mkParticle();
  });
  requestAnimationFrame(animateParticles);
})();

setInterval(() => {
  for (let k = 0; k < 2; k++) particles.push(mkParticle());
  while (particles.length > 48) particles.shift();
}, 2800);

// ══════════════════════════════════════════
// CUSTOM CURSOR
// ══════════════════════════════════════════
const curEl = document.getElementById('cur');
const trailEl = document.getElementById('cur-trail');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curEl.style.left = mx + 'px'; curEl.style.top = my + 'px';
});

(function trailLoop() {
  rx += (mx - rx) * 0.1; ry += (my - ry) * 0.1;
  trailEl.style.left = rx + 'px'; trailEl.style.top = ry + 'px';
  requestAnimationFrame(trailLoop);
})();

// Cursor hover effect — event delegation for dynamic buttons
document.addEventListener('mouseover', e => {
  if (e.target.closest('button, input, .choice-btn')) {
    curEl.style.width = '14px'; curEl.style.height = '14px';
    curEl.style.boxShadow = '0 0 24px 6px rgba(232,99,122,0.6)';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('button, input, .choice-btn')) {
    curEl.style.width = '6px'; curEl.style.height = '6px';
    curEl.style.boxShadow = '0 0 16px 4px rgba(232,99,122,0.45)';
  }
});
